<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2040"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="glow-filter"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#sky)"/>
  <!-- Grid lines (battle grid) -->
  <g opacity="0.08" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="100" y1="0" x2="100" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="500" y1="0" x2="500" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/><line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="63" x2="1200" y2="63"/><line x1="0" y1="126" x2="1200" y2="126"/><line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/><line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/><line x1="0" y1="504" x2="1200" y2="504"/><line x1="0" y1="567" x2="1200" y2="567"/>
  </g>
  <!-- Hit markers scattered -->
  <g opacity="0.4">
    <text x="155" y="80" font-size="28" fill="#ff3030" text-anchor="middle">✕</text>
    <text x="355" y="143" font-size="28" fill="#ff3030" text-anchor="middle">✕</text>
    <text x="755" y="206" font-size="28" fill="#3a5070" text-anchor="middle">·</text>
    <text x="955" y="80" font-size="28" fill="#3a5070" text-anchor="middle">·</text>
    <text x="55" y="332" font-size="28" fill="#3a5070" text-anchor="middle">·</text>
    <text x="1055" y="395" font-size="28" fill="#ff3030" text-anchor="middle">✕</text>
  </g>
  <!-- Ship silhouette -->
  <g transform="translate(600,400)" opacity="0.12">
    <rect x="-280" y="-20" width="560" height="40" rx="8" fill="#00d4ff"/>
    <rect x="-160" y="-50" width="200" height="35" rx="4" fill="#00d4ff"/>
    <rect x="-80" y="-80" width="80" height="35" rx="4" fill="#00d4ff"/>
    <polygon points="-280,-20 -320,20 -280,20" fill="#00d4ff"/>
    <polygon points="280,-20 320,20 280,20" fill="#00d4ff"/>
  </g>
  <!-- Glow behind title -->
  <ellipse cx="600" cy="250" rx="350" ry="120" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Anchor icon -->
  <g transform="translate(600,160)" filter="url(#glow-filter)">
    <circle cx="0" cy="-50" r="22" fill="none" stroke="#00d4ff" stroke-width="6"/>
    <line x1="0" y1="-28" x2="0" y2="50" stroke="#00d4ff" stroke-width="6" stroke-linecap="round"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#00d4ff" stroke-width="6" stroke-linecap="round"/>
    <path d="M-40,46 Q-40,68 0,72 Q40,68 40,46" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- Title -->
  <text x="600" y="310" text-anchor="middle" font-family="Arial Black,Helvetica Neue,sans-serif" font-size="100" font-weight="900" letter-spacing="20" fill="#00d4ff" filter="url(#glow-filter)">BATTLESHIP</text>
  <!-- Tagline -->
  <text x="600" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" letter-spacing="8" fill="#6090b0">VS AI  ·  REAL-TIME MULTIPLAYER  ·  FREE</text>
  <!-- Ocean waves at bottom -->
  <path d="M0,540 Q150,510 300,540 Q450,570 600,540 Q750,510 900,540 Q1050,570 1200,540 L1200,630 L0,630 Z" fill="#0d2a40" opacity="0.6"/>
  <path d="M0,570 Q200,545 400,570 Q600,595 800,570 Q1000,545 1200,570 L1200,630 L0,630 Z" fill="#0a1e30" opacity="0.8"/>
  <!-- Branding -->
  <text x="600" y="610" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" fill="#2a4060" letter-spacing="4">HACKATOA GAMES  ·  games.hackatoa.com</text>
</svg>
